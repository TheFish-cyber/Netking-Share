<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netking Share Portal</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        /* --- GIAO DIỆN CHỦ ĐẠO CYBERPUNK --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #05050a;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(45deg, #00f0ff, #ff007f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Thống kê */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; text-align: center; }
        .stat-box { background: rgba(20, 20, 35, 0.6); border: 1px solid rgba(0, 240, 255, 0.2); padding: 15px; border-radius: 12px; }
        .stat-box h3 { color: #8a8ab0; font-size: 0.9rem; margin-bottom: 5px; }
        .stat-box p { font-size: 1.5rem; font-weight: bold; color: #00f0ff; }

        /* Khối tính năng Upload */
        .upload-section {
            background: rgba(10, 10, 20, 0.8);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            position: relative;
            border: 1px solid rgba(255, 0, 127, 0.2);
        }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        .btn-cyber {
            border: none; color: white; background: linear-gradient(45deg, #00f0ff, #ff007f);
            padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s;
        }
        .btn-cyber:hover { opacity: 0.9; transform: scale(1.01); }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer;
        }
        #upload-status { margin-top: 10px; color: #00ff66; font-size: 0.9rem; text-align: center; }

        /* Danh sách File */
        .file-list { display: flex; flex-direction: column; gap: 15px; }
        .file-item {
            background: rgba(20, 20, 35, 0.5); padding: 20px; border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: space-between; align-items: center;
        }
        .file-info h4 { color: #00f0ff; margin-bottom: 5px; }
        .file-info p { color: #8a8ab0; font-size: 0.85rem; }
        .btn-download {
            background: #ff007f; border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none;
        }

        /* --- NÚT CHAT BỔI NỔI NỔI GÓC DƯỚI PHẢI MÀN HÌNH --- */
        #chat-widget-container {
            position: fixed; bottom: 20px; right: 20px; z-index: 10000; font-family: sans-serif;
        }
        #chat-launcher {
            width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(45deg, #ff007f, #7000ff);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.6); border: none; color: white; font-size: 24px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        #chat-launcher:hover { transform: scale(1.1) rotate(10deg); }
        
        /* Hộp thoại Chat */
        #chat-box {
            display: none; flex-direction: column; width: 340px; height: 480px; 
            background: #0b0b16; border: 1px solid #ff007f; border-radius: 12px;
            box-shadow: 0 0 25px rgba(0,0,0,0.5); position: absolute; bottom: 75px; right: 0; overflow: hidden;
        }
        #chat-box.open { display: flex; animation: fadeInUp 0.3s ease; }
        .chat-header { background: linear-gradient(45deg, #7000ff, #ff007f); padding: 12px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .chat-header span { font-size: 0.95rem; letter-spacing: 1px; }
        .chat-header i { cursor: pointer; opacity: 0.8; }
        
        .chat-messages { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: rgba(5, 5, 10, 0.95); }
        .msg { max-width: 85%; padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; line-height: 1.4; word-break: break-all; position: relative; }
        .msg.other { background: #1a1a30; align-self: flex-start; border-bottom-left-radius: 0; color: #fff; }
        .msg.me { background: #ff007f; align-self: flex-end; border-bottom-right-radius: 0; color: white; }
        
        .msg-user-container { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
        .msg-avatar { width: 18px; height: 18px; border-radius: 50%; object-fit: cover; }
        .msg-user { font-size: 0.75rem; color: #00f0ff; font-weight: bold; }

        /* Vùng điểu khiển đăng nhập / Chat */
        .chat-login-area { padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; background: #0b0b16; border-top: 1px solid rgba(255,255,255,0.05); }
        .chat-input-area { padding: 10px; display: flex; gap: 8px; background: #0b0b16; border-top: 1px solid rgba(255,255,255,0.05); }
        .chat-input-area input { flex: 1; background: #121225; border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 6px; padding: 8px 12px; color: white; outline: none; }
        .chat-input-area button { background: #00f0ff; border: none; color: #05050a; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>NETKING SHARE PORTAL</h1>
            <p style="color: #8a8ab0; margin-top: 5px;">Kho lưu trữ và chia sẻ tệp tin trực tuyến công khai</p>
        </header>

        <div class="stats-grid">
            <div class="stat-box">
                <h3>Tổng File</h3>
                <p id="stat-total-files">0</p>
            </div>
            <div class="stat-box">
                <h3>Lượt Tải Hệ Thống</h3>
                <p id="stat-total-downloads">0</p>
            </div>
            <div class="stat-box">
                <h3>Đang Online (Active)</h3>
                <p id="stat-active-users">1</p>
            </div>
        </div>

        <div class="upload-section">
            <div class="upload-btn-wrapper">
                <button class="btn-cyber"><i class="fa-solid fa-cloud-arrow-up"></i> TẢI FILE LÊN ĐÂY</button>
                <input type="file" id="file-uploader" />
            </div>
            <div id="upload-status"></div>
        </div>

        <h3 style="margin-bottom: 15px; color: #ff007f;"><i class="fa-solid fa-folder-open"></i> Tệp tin mới nhất</h3>
        <div class="file-list" id="files-container">
            </div>
    </div>

    <div id="chat-widget-container">
        <button id="chat-launcher" onclick="toggleChat()"><i class="fa-solid fa-comments"></i></button>
        
        <div id="chat-box">
            <div class="chat-header">
                <span><i class="fa-solid fa-circle" style="color: #00ff66; font-size: 10px;"></i> NETKING CHATROOM</span>
                <i class="fa-solid fa-xmark" onclick="toggleChat()"></i>
            </div>
            <div class="chat-messages" id="chat-messages-container">
                </div>
            
            <div id="chat-controls">
                <div class="chat-login-area" id="google-login-box">
                    <p style="font-size: 0.8rem; color: #8a8ab0; text-align: center;">Vui lòng đăng nhập Google để tham gia nhắn tin</p>
                    <div id="buttonDiv"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";
        import { getDatabase, ref as rRef, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // CẤU HÌNH FIREBASE CỦA BẠN (GIỮ NGUYÊN NẾU ĐÃ CẤU HÌNH TRƯỚC ĐÓ)
        const firebaseConfig = {
            apiKey: "AIzaSyA1...",
            authDomain: "netking-share.firebaseapp.com",
            projectId: "netking-share",
            storageBucket: "netking-share.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456:web:abcde",
            databaseURL: "https://netking-share-default-rtdb.firebaseio.com"
        };

        // Khởi tạo các dịch vụ
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const rtdb = getDatabase(app);

        // Biến lưu trữ thông tin user sau khi Login Google thành công
        let currentUserData = null;
        // Tạo ID tạm thời để đếm số user Online thực tế
        let sessionID = 'User_' + Math.floor(1000 + Math.random() * 9000);

        // --- 1. THỐNG KÊ ACTIVE USERS REALTIME ---
        const myConnectionsRef = rRef(rtdb, `connections/${sessionID}`);
        const connectedRef = rRef(rtdb, '.info/connected');
        onValue(connectedRef, (snap) => {
            if (snap.val() === true) {
                set(myConnectionsRef, true);
                onDisconnect(myConnectionsRef).remove();
            }
        });
        onValue(rRef(rtdb, 'connections'), (snap) => {
            const count = snap.exists() ? Object.keys(snap.val()).length : 1;
            document.getElementById('stat-active-users').innerText = count;
        });

        // --- 2. XỬ LÝ UPLOAD FILE CÔNG KHAI ---
        const fileInput = document.getElementById('file-uploader');
        const uploadStatus = document.getElementById('upload-status');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            uploadStatus.innerText = "Đang chuẩn bị đẩy tệp lên máy chủ...";
            const storageRef = ref(storage, 'shares/' + Date.now() + '_' + file.name);
            const uploadTask = uploadBytesResumable(storageRef, file);

            uploadTask.on('state_changed', 
                (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    uploadStatus.innerText = `Đang tải lên: ${Math.round(progress)}%`;
                }, 
                (error) => {
                    uploadStatus.innerText = "Lỗi tải lên tệp: " + error.message;
                }, 
                () => {
                    getDownloadURL(uploadTask.snapshot.ref).then((downloadURL) => {
                        addDoc(collection(db, "files"), {
                            name: file.name,
                            url: downloadURL,
                            size: (file.size / (1024 * 1024)).toFixed(2) + " MB",
                            downloads: 0,
                            timestamp: serverTimestamp()
                        });
                        uploadStatus.innerText = "Tải lên tệp thành công tuyệt đối!";
                        fileInput.value = ''; 
                    });
                }
            );
        });

        // --- 3. ĐỒNG BỘ DANH SÁCH FILE VÀ LƯỢT TẢI ---
        const qFiles = query(collection(db, "files"), orderBy("timestamp", "desc"));
        onSnapshot(qFiles, (snapshot) => {
            const filesContainer = document.getElementById('files-container');
            filesContainer.innerHTML = '';
            let totalDownloads = 0;
            let totalFiles = snapshot.size;

            snapshot.forEach((docSnap) => {
                const fileData = docSnap.data();
                const fileId = docSnap.id;
                totalDownloads += (fileData.downloads || 0);

                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <div class="file-info">
                        <h4>${fileData.name}</h4>
                        <p>Dung lượng: ${fileData.size} | Lượt tải: <span>${fileData.downloads || 0}</span></p>
                    </div>
                    <button class="btn-download" data-id="${fileId}" data-url="${fileData.url}">Tải Xuống</button>
                `;
                filesContainer.appendChild(item);
            });

            document.getElementById('stat-total-files').innerText = totalFiles;
            document.getElementById('stat-total-downloads').innerText = totalDownloads;

            document.querySelectorAll('.btn-download').forEach(button => {
                button.addEventListener('click', async (e) => {
                    e.preventDefault();
                    const id = button.getAttribute('data-id');
                    const url = button.getAttribute('data-url');
                    const fileRef = doc(db, "files", id);
                    await updateDoc(fileRef, { downloads: increment(1) });
                    window.open(url, '_blank');
                });
            });
        });

        // --- 4. HỆ THỐNG ĐỒNG BỘ CHAT REALTIME (CÓ AVATAR GOOGLE) ---
        const qChat = query(collection(db, "chats"), orderBy("timestamp", "asc"));
        onSnapshot(qChat, (snapshot) => {
            const chatContainer = document.getElementById('chat-messages-container');
            chatContainer.innerHTML = '';
            snapshot.forEach((docSnap) => {
                const chat = docSnap.data();
                const msgDiv = document.createElement('div');
                
                // Kiểm tra xem tin nhắn có phải của chính mình gửi dựa theo email
                const isMe = currentUserData && chat.email === currentUserData.email;
                msgDiv.className = `msg ${isMe ? 'me' : 'other'}`;
                
                // Hiển thị Avatar và Tên tài khoản Google của người gửi tin nhắn
                msgDiv.innerHTML = `
                    <div class="msg-user-container">
                        <img class="msg-avatar" src="${chat.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" alt="Avatar">
                        <span class="msg-user">${isMe ? 'Bạn' : chat.user}</span>
                    </div>
                    <div>${chat.text}</div>
                `;
                chatContainer.appendChild(msgDiv);
            });
            chatContainer.scrollTop = chatContainer.scrollHeight;
        });

        // Xử lý gửi tin nhắn kèm thông tin định danh Google
        window.sendChatMessage = function() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text || !currentUserData) return;

            addDoc(collection(db, "chats"), {
                user: currentUserData.name,
                email: currentUserData.email,
                avatar: currentUserData.picture,
                text: text,
                timestamp: serverTimestamp()
            });
            input.value = '';
        }

        window.handleChatKey = function(e) {
            if(e.key === 'Enter') sendChatMessage();
        }

        // --- 5. ĐIỀU HƯỚNG ĐĂNG NHẬP GOOGLE API CHÍNH THỨC ---
        function parseJwt (token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        // Callback nhận kết quả khi đăng nhập thành công
        window.handleCredentialResponse = function(response) {
            const responsePayload = parseJwt(response.credential);
            currentUserData = responsePayload; // Lưu thông tin Tên, Email, Ảnh đại diện

            // Chuyển giao diện từ nút "Đăng nhập" sang "Khung nhập nội dung chat"
            const controls = document.getElementById('chat-controls');
            controls.innerHTML = `
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." onkeypress="handleChatKey(event)"/>
                    <button onclick="sendChatMessage()">Gửi</button>
                </div>
            `;
        }

        // Khởi chạy bộ cài đặt nút Google khi load trang web
        window.onload = function () {
            google.accounts.id.initialize({
                // client_id chính xác trích xuất từ chuỗi liên kết OAuth của bạn cung cấp
                client_id: "799208696035-icbc4f2ghqkotqvro40iua27tmgbscc5.apps.googleusercontent.com",
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("buttonDiv"),
                { theme: "dark", size: "medium", width: "240" }  // Thiết lập nút giao diện Dark Mode khớp với trang web
            );
        }
    </script>

    <script>
        function toggleChat() {
            const chatBox = document.getElementById('chat-box');
            chatBox.classList.toggle('open');
        }
    </script>
</body>
</html>
