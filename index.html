<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netking Files</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #05050a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .text-gradient {
            background: linear-gradient(45deg, #00f0ff, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        h1 { font-size: 2.2rem; margin-bottom: 5px; text-align: center; letter-spacing: 1px;}
        p.subtitle { color: #8a8ab0; font-size: 0.95rem; margin-bottom: 30px; text-align: center; }

        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(10, 10, 20, 0.85);
            border-radius: 16px;
            padding: 25px;
            position: relative;
            backdrop-filter: blur(10px);
        }
        .container::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 18px; background: linear-gradient(135deg, #00f0ff, #7000ff, #ff007f);
            z-index: -1; pointer-events: none;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #00f0ff; font-weight: bold; font-size: 0.9rem; }
        input[type="text"], input[type="file"] {
            width: 100%; padding: 12px; background: rgba(20, 20, 35, 0.6);
            border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 8px;
            color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #ff007f; box-shadow: 0 0 10px rgba(255, 0, 127, 0.2); }

        .btn-submit {
            width: 100%; padding: 14px; background: linear-gradient(45deg, #00f0ff, #ff007f);
            border: none; border-radius: 8px; color: white; font-weight: bold;
            cursor: pointer; font-size: 1rem; transition: transform 0.1s ease, box-shadow 0.3s;
        }
        .btn-submit:active { transform: scale(0.96); }
        .btn-submit:hover { box-shadow: 0 0 15px rgba(0, 240, 255, 0.4); }

        .file-list { margin-top: 30px; width: 100%; }
        .file-item {
            background: rgba(20, 20, 35, 0.7); padding: 15px; border-radius: 8px;
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .file-info h4 { color: #ffffff; font-size: 1rem; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; max-width: 350px; }
        .file-info span { color: #8a8ab0; font-size: 0.8rem; }
        
        .btn-view {
            background: transparent; border: 1px solid #00f0ff; color: #00f0ff;
            padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer;
            text-decoration: none; font-size: 0.85rem; transition: all 0.2s;
        }
        .btn-view:hover { background: #00f0ff; color: #05050a; }

        /* 1. KHUNG LOADING RIÊNG */
        #loading-frame {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 10, 0.9); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        #loading-frame.active { opacity: 1; pointer-events: auto; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(0, 240, 255, 0.1); border-left-color: #00f0ff; border-right-color: #ff007f;
            border-radius: 50%; animation: spin 1s infinite linear;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .loading-text { margin-top: 15px; color: #00f0ff; font-weight: bold; letter-spacing: 1px; }

        .error-msg { color: #ff0055; font-size: 0.85rem; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div id="loading-frame">
        <div class="spinner"></div>
        <div class="loading-text">ĐANG LƯU FILE VÀO SERVER WEB CỦA BẠN...</div>
    </div>

    <h1 class="text-gradient">NETKING SHARE PORTAL</h1>
    <p class="subtitle">Hệ thống tự lưu trữ và chia sẻ file độc lập</p>

    <div class="container">
        <div class="form-group">
            <label>TÊN FILE / TIÊU ĐỀ</label>
            <input type="text" id="file-title" placeholder="Nhập tên tệp tin hoặc tiêu đề...">
        </div>

        <div class="form-group">
            <label>ĐƯỜNG DẪN LIÊN KẾT (Tùy chọn)</label>
            <input type="text" id="file-url" placeholder="https://example.com">
            <div id="url-error" class="error-msg">Lỗi: Định dạng link giả mạo hoặc sai tên miền chuẩn (TLD)!</div>
        </div>

        <div class="form-group">
            <label>HOẶC CHỌN TỆP TIN TỪ THIẾT BỊ</label>
            <input type="file" id="file-upload">
        </div>

        <button class="btn-submit" onclick="handleUpload()">TẢI LÊN SERVER RIÊNG</button>

        <div class="file-list" id="files-container">
            <label>TỆP TIN MỚI NHẤT</label>
        </div>
    </div>

    <script>
        // API Endpoint hướng vào Server cục bộ của bạn
        const API_URL = '/api/upload';

        // 2. REGEX nhận diện link chuẩn TLD (Chặn các đuôi lỗi kiểu .cooooo)
        const urlPattern = /^(https:\/\/)[a-zA-Z0-9.-]+\.[a-zA-Z]{2,6}(\/[a-zA-Z0-9._%+-]*)*$/;

        window.onload = function() {
            fetchFiles();
        };

        // Lấy danh sách file từ server riêng
        async function fetchFiles() {
            try {
                const res = await fetch(API_URL);
                const files = await res.json();
                const container = document.getElementById("files-container");
                container.innerHTML = '<label>TỆP TIN MỚI NHẤT</label>';
                
                files.forEach(file => {
                    const item = document.createElement("div");
                    item.className = "file-item";
                    
                    // 4. Nhấp nút Xem file sẽ mở Link web hoặc tải file được up lên
                    const targetLink = file.fileUrl ? file.fileUrl : file.downloadUrl;

                    item.innerHTML = `
                        <div class="file-info">
                            <h4>${file.title}</h4>
                            <span>${new Date(file.createdAt).toLocaleDateString()}</span>
                        </div>
                        <a href="${targetLink}" target="_blank" class="btn-view">Xem File</a>
                    `;
                    container.appendChild(item);
                });
            } catch (err) {
                console.error("Không thể tải danh sách file:", err);
            }
        }

        // Thực hiện tải lên dữ liệu
        async function handleUpload() {
            const title = document.getElementById("file-title").value.trim();
            const urlInput = document.getElementById("file-url").value.trim();
            const fileInput = document.getElementById("file-upload").files[0];
            const urlError = document.getElementById("url-error");

            urlError.style.display = "none";

            if (!title) {
                alert("Vui lòng điền tiêu đề!");
                return;
            }

            // 3. GIỚI HẠN LƯỢT TẢI: Tối đa 2 files / ngày dựa trên LocalStorage máy client
            const today = new Date().toDateString();
            let uploadCount = localStorage.getItem("local_up_count_" + today) ? parseInt(localStorage.getItem("local_up_count_" + today)) : 0;

            if (uploadCount >= 2) {
                alert("Bạn đã hết lượt tải lên cho ngày hôm nay (Tối đa 2 file/ngày)!");
                return;
            }

            // Kiểm tra tính hợp lệ của Link (nếu có nhập)
            if (urlInput !== "") {
                if (!urlPattern.test(urlInput)) {
                    urlError.style.display = "block";
                    return;
                }
            }

            if (!fileInput && urlInput === "") {
                alert("Vui lòng chọn một file vật lý hoặc dán đường dẫn link hợp lệ!");
                return;
            }

            // Bật Khung Loading tải dữ liệu
            document.getElementById("loading-frame").classList.add("active");

            // Đóng gói dữ liệu dạng Form để gửi lên server riêng
            const formData = new FormData();
            formData.append("title", title);
            formData.append("urlInput", urlInput);
            if (fileInput) {
                formData.append("fileUpload", fileInput);
            }

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: formData // Gửi trực tiếp lên back-end server của bạn
                });

                if (response.ok) {
                    // Tăng số lượt giới hạn tải trong ngày lên 1 đơn vị
                    uploadCount++;
                    localStorage.setItem("local_up_count_" + today, uploadCount);

                    // Reset form
                    document.getElementById("file-title").value = "";
                    document.getElementById("file-url").value = "";
                    document.getElementById("file-upload").value = "";
                    
                    alert("Tải lên hệ thống máy chủ thành công!");
                    fetchFiles(); // Làm mới lại danh sách
                } else {
                    alert("Tải lên thất bại do lỗi cấu hình server.");
                }
            } catch (error) {
                alert("Không thể kết nối đến máy chủ: " + error.message);
            } finally {
                // Tắt hiệu ứng loading
                document.getElementById("loading-frame").classList.remove("active");
            }
        }
    </script>
</body>
</html>
